<!DOCTYPE html>
<html>
<head>
<title>Three Boxes</title>

<style>
.container{
    position: absolute;
    top: 10px;
    right: 10px;
}

.box{
    width: 100px;
    height: 100px;
    background-color: lightblue;
    border: 2px solid black;
    margin: 5px;
    text-align: center;
    line-height: 100px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="container">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
</div>

</body>
</html>
