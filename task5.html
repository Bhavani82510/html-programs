<!DOCTYPE html>
<html>
<head>
<title>Reverse Order Boxes</title>

<style>
.container{
    display: flex;
    flex-direction: row-reverse;   /* Reverse the order */
}

.box{
    width: 100px;
    height: 100px;
    background-color: lightcoral;
    border: 2px solid black;
    margin: 5px;
    text-align: center;
    line-height: 100px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
</div>

</body>
</html>
