<!DOCTYPE html>
<html>
<head>
<title>Four Items in One Line</title>

<style>
.container{
    display: flex;
    justify-content: space-between;  /* Equal space between items */
    border: 2px solid black;
    padding: 10px;
}

.item{
    width: 80px;
    height: 80px;
    background-color: lightblue;
    border: 2px solid black;
    text-align: center;
    line-height: 80px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
    <div class="item">1</div>
    <div class="item">2</div>
    <div class="item">3</div>
    <div class="item">4</div>
</div>

</body>
</html>
