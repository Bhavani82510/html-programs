<!DOCTYPE html>
<html>
<head>
<title>Center Div Using Flexbox</title>

<style>
.outer{
    width: 400px;
    height: 300px;
    border: 2px solid black;

    display: flex;
    justify-content: center;   /* Horizontal center */
    align-items: center;       /* Vertical center */
}

.inner{
    width: 150px;
    height: 100px;
    background-color: lightblue;
    text-align: center;
    line-height: 100px;
}
</style>

</head>
<body>

<div class="outer">
    <div class="inner">Chandana</div>
</div>

</body>
</html>
