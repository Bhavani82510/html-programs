<!DOCTYPE html>
<html>
<head>
<title>Navbar with Equal Space</title>

<style>
.navbar{
    display: flex;
    justify-content: space-around;  
    background-color: black;
    padding: 10px;
}

.navbar a{
    color: white;
    text-decoration: none;
    font-size: 18px;
    padding: 10px;
}
</style>

</head>
<body>

<div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</div>

</body>
</html>
