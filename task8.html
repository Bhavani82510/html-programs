<!DOCTYPE html>
<html>
<head>
<title>Flex Grow Example</title>

<style>
.container{
    display: flex;
    border: 2px solid black;
}

.box{
    width: 100px;
    height: 80px;
    background-color: lightblue;
    border: 2px solid black;
    margin: 5px;
    text-align: center;
    line-height: 80px;
    font-weight: bold;
}

.grow{
    flex-grow: 1;   /* This box takes remaining space */
}
</style>

</head>
<body>

<div class="container">
    <div class="box">1</div>
    <div class="box grow">2</div>
    <div class="box">3</div>
</div>

</body>
</html>
