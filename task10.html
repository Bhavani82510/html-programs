<!DOCTYPE html>
<html>
<head>
<style>
.container{
    display: flex;
    height: 200px;
    align-items: flex-start;  
    border: 2px solid black;
}

.box{
    width: 100px;
    height: 80px;
    background: lightblue;
    margin: 10px;
}

.special{
    align-self: flex-end; 
}
</style>
</head>
<body>

<div class="container">
    <div class="box">1</div>
    <div class="box special">2</div>
    <div class="box">3</div>
</div>

</body>
</html>
